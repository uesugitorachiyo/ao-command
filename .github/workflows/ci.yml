name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  license-policy:
    name: License policy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ao-command
        uses: actions/checkout@v7

      - name: Check license policy
        run: scripts/check-license-policy.sh

  go:
    name: Go
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ao-command
        uses: actions/checkout@v7

      - name: Checkout ao-forge integration fixture
        uses: actions/checkout@v7
        with:
          repository: uesugitorachiyo/ao-forge
          path: ao-forge

      - name: Checkout ao-foundry active-stack fixture
        uses: actions/checkout@v7
        with:
          repository: uesugitorachiyo/ao-foundry
          path: ao-foundry

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./... -count=1

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -o bin/ao-command ./cmd/ao-command

      - name: RSI health dry-run
        run: |
          mkdir -p tmp/rsi-health
          cat > tmp/rsi-health/arena-promotion-gate.json <<'JSON'
          {
            "schema_version": "ao.arena.promotion-gate.v0.1",
            "status": "passed",
            "winner": "ao-orchestration"
          }
          JSON
          cat > tmp/rsi-health/crucible-hardening-gate.json <<'JSON'
          {
            "schema_version": "ao.crucible.hardening-gate.v0.1",
            "status": "passed",
            "score": 97
          }
          JSON
          cat > tmp/rsi-health/sentinel-verdict.json <<'JSON'
          {
            "schema_version": "ao.sentinel.verdict.v0.1",
            "verdict": "clear",
            "safety_status": "passed",
            "regression_status": "passed",
            "promoter_hold_required": false,
            "mutates_live_state": false
          }
          JSON
          cat > tmp/rsi-health/promoter-gate.json <<'JSON'
          {
            "schema_version": "ao.promoter.gate.v0.1",
            "status": "passed",
            "promotion_allowed": true,
            "activation_plan_allowed": true,
            "blockers": []
          }
          JSON
          cat > tmp/rsi-health/foundry-rsi-improvement-gate.json <<'JSON'
          {
            "schema_version": "ao.foundry.rsi-improvement-gate.v0.1",
            "status": "passed",
            "baseline_score": 90,
            "candidate_score": 100,
            "required_improvement_percent": 5,
            "actual_improvement_percent": 10,
            "autonomous_claim": "measured_local_improvement",
            "mutates_repositories": false,
            "evidence": [
              {
                "label": "baseline",
                "path": "examples/evals/rsi-baseline.eval-result.json",
                "schema_version": "ao.foundry.eval-result.v0.1",
                "status": "ready",
                "score": 90,
                "max_score": 100,
                "sha256": "e5824cee9ef1455fcdc74dfecc7e30710edb5ef67cb939eff92d57283dfdc52e"
              },
              {
                "label": "candidate",
                "path": "tmp/pulse-rsi-verify/eval-result.json",
                "schema_version": "ao.foundry.eval-result.v0.1",
                "status": "ready",
                "score": 100,
                "max_score": 100,
                "sha256": "cf3f99d1b1639ef2fd2ba24cb75481211c0c4b0ad8e81605be5fbd6e3f7f39ec"
              }
            ]
          }
          JSON
          cat > tmp/rsi-health/foundry-rsi-candidate.json <<'JSON'
          {
            "schema_version": "ao.foundry.rsi-candidate.v0.1",
            "status": "ready",
            "generated_by": "foundry pulse run",
            "improvement_hypothesis": "Local pulse generated the candidate eval result from the current Foundry run before measuring the RSI improvement gate.",
            "baseline_eval_result": {
              "path": "examples/evals/rsi-baseline.eval-result.json",
              "schema_version": "ao.foundry.eval-result.v0.1",
              "status": "ready",
              "score": 90,
              "max_score": 100,
              "sha256": "e5824cee9ef1455fcdc74dfecc7e30710edb5ef67cb939eff92d57283dfdc52e"
            },
            "candidate_eval_result": {
              "path": "tmp/pulse-rsi-verify/eval-result.json",
              "schema_version": "ao.foundry.eval-result.v0.1",
              "status": "ready",
              "score": 100,
              "max_score": 100,
              "sha256": "cf3f99d1b1639ef2fd2ba24cb75481211c0c4b0ad8e81605be5fbd6e3f7f39ec"
            },
            "mutates_repositories": false,
            "next_actions": []
          }
          JSON
          cat > tmp/rsi-health/foundry-rsi-next-improvement-task.json <<'JSON'
          {
            "schema_version": "ao.foundry.rsi-next-improvement-task.v0.1",
            "status": "ready",
            "generated_by": "foundry pulse run",
            "goal_id": "ao-foundry-production-readiness",
            "recommended_task_id": "rsi-next-ci",
            "recommended_action": "retain the next bounded RSI improvement task as governed evidence",
            "improvement_rationale": "The local pulse produced an RSI candidate and a passing improvement gate, so the next bounded task can be retained as governed evidence before delegation.",
            "candidate_evidence_path": "tmp/rsi-health/foundry-rsi-candidate.json",
            "gate_evidence_path": "tmp/rsi-health/foundry-rsi-improvement-gate.json",
            "required_improvement_percent": 5,
            "actual_improvement_percent": 10,
            "autonomous_claim": "derived_local_next_improvement",
            "mutates_repositories": false,
            "next_actions": [
              "retain rsi_next_improvement_task with RSI candidate and gate evidence"
            ]
          }
          JSON
          cat > tmp/rsi-health/forge-retained-foundry-rsi-improvement-gate.json <<'JSON'
          {
            "schema_version": "ao.forge.goal-run-retained-evidence.v0.1",
            "goal_id": "ao2-weekend-hardening",
            "iteration": "20260619T180000Z-verification",
            "phase": "verification",
            "captured_outputs": [
              {
                "label": "ao-foundry-rsi-improvement-gate",
                "command": "foundry pulse run",
                "schema_version": "ao.foundry.rsi-improvement-gate.v0.1",
                "status": "passed",
                "baseline_score": 90,
                "candidate_score": 100,
                "required_improvement_percent": 5,
                "actual_improvement_percent": 10,
                "autonomous_claim": "measured_local_improvement",
                "mutates_repositories": false
              }
            ],
            "retention_policy": {
              "layout": "docs/evidence/goals/<goal_id>/<YYYYMMDDTHHMMSSZ>-<phase>/",
              "temporary_paths_allowed": false,
              "minimum_retention_days_after_terminal_phase": 90
            },
            "retention_metadata": {
              "retained_at": "2026-06-19T18:00:00Z",
              "retention_class": "loop_evidence",
              "retain_while_goal_active": true,
              "deletion_requires_review": true,
              "cleanup_change_must_name": ["goal_id", "iteration", "reason"]
            }
          }
          JSON
          cat > tmp/rsi-health/forge-retained-foundry-rsi-candidate.json <<'JSON'
          {
            "schema_version": "ao.forge.goal-run-retained-evidence.v0.1",
            "goal_id": "ao2-weekend-hardening",
            "iteration": "20260619T180000Z-verification",
            "phase": "verification",
            "captured_outputs": [
              {
                "label": "ao-foundry-rsi-candidate",
                "command": "foundry pulse run",
                "schema_version": "ao.foundry.rsi-candidate.v0.1",
                "status": "ready",
                "generated_by": "foundry pulse run",
                "baseline_score": 90,
                "candidate_score": 100,
                "mutates_repositories": false
              }
            ],
            "retention_policy": {
              "layout": "docs/evidence/goals/<goal_id>/<YYYYMMDDTHHMMSSZ>-<phase>/",
              "temporary_paths_allowed": false,
              "minimum_retention_days_after_terminal_phase": 90
            },
            "retention_metadata": {
              "retained_at": "2026-06-19T18:00:00Z",
              "retention_class": "loop_evidence",
              "retain_while_goal_active": true,
              "deletion_requires_review": true,
              "cleanup_change_must_name": ["goal_id", "iteration", "reason"]
            }
          }
          JSON
          cat > tmp/rsi-health/forge-retained-foundry-rsi-next-improvement-task.json <<'JSON'
          {
            "schema_version": "ao.forge.goal-run-retained-evidence.v0.1",
            "goal_id": "ao2-weekend-hardening",
            "iteration": "20260619T180000Z-verification",
            "phase": "verification",
            "captured_outputs": [
              {
                "label": "ao-foundry-rsi-next-improvement-task",
                "command": "foundry pulse run",
                "schema_version": "ao.foundry.rsi-next-improvement-task.v0.1",
                "status": "ready",
                "required_improvement_percent": 5,
                "actual_improvement_percent": 10,
                "autonomous_claim": "derived_local_next_improvement",
                "mutates_repositories": false
              }
            ],
            "retention_policy": {
              "layout": "docs/evidence/goals/<goal_id>/<YYYYMMDDTHHMMSSZ>-<phase>/",
              "temporary_paths_allowed": false,
              "minimum_retention_days_after_terminal_phase": 90
            },
            "retention_metadata": {
              "retained_at": "2026-06-19T18:00:00Z",
              "retention_class": "loop_evidence",
              "retain_while_goal_active": true,
              "deletion_requires_review": true,
              "cleanup_change_must_name": ["goal_id", "iteration", "reason"]
            }
          }
          JSON
          cat > tmp/rsi-health/forge-retained-command-rsi-health.json <<'JSON'
          {
            "schema_version": "ao.forge.goal-run-retained-evidence.v0.1",
            "goal_id": "ao2-weekend-hardening",
            "iteration": "20260619T180000Z-verification",
            "phase": "verification",
            "captured_outputs": [
              {
                "label": "ao-command-rsi-health",
                "command": "ao-command rsi health",
                "status": "passed",
                "rsi_mode": "governed_fixture_local",
                "rsi_capability": "demonstrated_local_fixture_loop",
                "operator_mode": "read_only",
                "mutates_repositories": false,
                "families": [
                  {"family": "ao-arena", "status": "passed", "passed": true},
                  {"family": "ao-crucible", "status": "passed", "passed": true},
                  {"family": "ao-sentinel", "status": "clear", "passed": true},
                  {"family": "ao-promoter", "status": "passed", "passed": true},
                  {"family": "ao-foundry", "status": "passed", "passed": true}
                ]
              }
            ],
            "retention_policy": {
              "layout": "docs/evidence/goals/<goal_id>/<YYYYMMDDTHHMMSSZ>-<phase>/",
              "temporary_paths_allowed": false,
              "minimum_retention_days_after_terminal_phase": 90
            },
            "retention_metadata": {
              "retained_at": "2026-06-19T18:00:00Z",
              "retention_class": "loop_evidence",
              "retain_while_goal_active": true,
              "deletion_requires_review": true,
              "cleanup_change_must_name": ["goal_id", "iteration", "reason"]
            }
          }
          JSON
          bin/ao-command rsi health \
            --arena-gate tmp/rsi-health/arena-promotion-gate.json \
            --crucible-gate tmp/rsi-health/crucible-hardening-gate.json \
            --sentinel-verdict tmp/rsi-health/sentinel-verdict.json \
            --promoter-gate tmp/rsi-health/promoter-gate.json \
            --foundry-gate tmp/rsi-health/foundry-rsi-improvement-gate.json \
            --foundry-candidate tmp/rsi-health/foundry-rsi-candidate.json \
            --foundry-next-task tmp/rsi-health/foundry-rsi-next-improvement-task.json \
            --forge-retained-gate tmp/rsi-health/forge-retained-foundry-rsi-improvement-gate.json \
            --forge-retained-candidate tmp/rsi-health/forge-retained-foundry-rsi-candidate.json \
            --forge-retained-next-task tmp/rsi-health/forge-retained-foundry-rsi-next-improvement-task.json \
            --forge-retained-command-health tmp/rsi-health/forge-retained-command-rsi-health.json \
            --bundle-out tmp/rsi-health/rsi-health-bundle.json \
            --json
          test -s tmp/rsi-health/rsi-health-bundle.json

      - name: Integration smoke
        run: scripts/ao-command-smoke.sh --forge ao-forge --out tmp/ao-command-smoke

      - name: Active stack status
        run: go run ./cmd/ao-command stack --ledger ao-foundry/examples/readiness/active-stack-readiness.ledger.json

  workflow-lint:
    name: Workflow lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ao-command
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Actionlint
        run: go run github.com/rhysd/actionlint/cmd/actionlint@latest

  production-readiness:
    name: Production readiness audit
    runs-on: ubuntu-latest
    needs:
      - go
      - workflow-lint
    steps:
      - name: Checkout ao-command
        uses: actions/checkout@v7

      - name: Checkout ao-forge integration fixture
        uses: actions/checkout@v7
        with:
          repository: uesugitorachiyo/ao-forge
          path: ao-forge

      - name: Checkout ao-foundry active-stack fixture
        uses: actions/checkout@v7
        with:
          repository: uesugitorachiyo/ao-foundry
          path: ao-foundry

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Release preview dry-run
        run: |
          scripts/release-preview-dry-run.sh --forge ao-forge --out tmp/release-preview --tag v0.1.0-preview

      - name: Validate release preview contract
        run: |
          go run ./cmd/ao-command evidence \
            --forge ao-forge \
            --schema "$PWD/docs/contracts/release-preview-audit-v0.1.schema.json" \
            --document "$PWD/tmp/release-preview/release-preview-audit.json"

      - name: Install verification dry-run
        run: |
          scripts/install-verify-dry-run.sh --forge ao-forge --out tmp/install-verify

      - name: Validate install verification contract
        run: |
          go run ./cmd/ao-command evidence \
            --forge ao-forge \
            --schema "$PWD/docs/contracts/install-verify-audit-v0.1.schema.json" \
            --document "$PWD/tmp/install-verify/install-verify-audit.json"

      - name: Release governance dry-run
        run: |
          scripts/release-governance-dry-run.sh \
            --out tmp/release-governance \
            --tag v0.1.0 \
            --release-preview-audit tmp/release-preview/release-preview-audit.json \
            --install-verify-audit tmp/install-verify/install-verify-audit.json

      - name: Validate release governance contract
        run: |
          go run ./cmd/ao-command evidence \
            --forge ao-forge \
            --schema "$PWD/docs/contracts/release-governance-audit-v0.1.schema.json" \
            --document "$PWD/tmp/release-governance/release-governance-audit.json"

      - name: Active stack status
        run: |
          go run ./cmd/ao-command stack --ledger ao-foundry/examples/readiness/active-stack-readiness.ledger.json

      - name: Production readiness audit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          scripts/production-readiness-audit.sh --repo uesugitorachiyo/ao-command --forge ao-forge --foundry ao-foundry --out tmp/production-readiness-audit.json --skip-remote-admin || {
            cat tmp/production-readiness-audit.json
            exit 1
          }

      - name: Validate production readiness contract
        run: |
          go run ./cmd/ao-command evidence \
            --forge ao-forge \
            --schema "$PWD/docs/contracts/production-readiness-audit-v0.1.schema.json" \
            --document "$PWD/tmp/production-readiness-audit.json"
