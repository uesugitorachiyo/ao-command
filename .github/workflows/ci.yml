name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  license-policy:
    name: License policy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ao-command
        uses: actions/checkout@v4

      - name: Check license policy
        run: scripts/check-license-policy.sh

  go:
    name: Go
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ao-command
        uses: actions/checkout@v4

      - name: Checkout ao-forge integration fixture
        uses: actions/checkout@v4
        with:
          repository: uesugitorachiyo/ao-forge
          path: ao-forge

      - name: Checkout ao-foundry active-stack fixture
        uses: actions/checkout@v4
        with:
          repository: uesugitorachiyo/ao-foundry
          path: ao-foundry

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./... -count=1

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -o bin/ao-command ./cmd/ao-command

      - name: Integration smoke
        run: scripts/ao-command-smoke.sh --forge ao-forge --out tmp/ao-command-smoke

      - name: Active stack status
        run: go run ./cmd/ao-command stack --ledger ao-foundry/examples/readiness/active-stack-readiness.ledger.json

  workflow-lint:
    name: Workflow lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ao-command
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Actionlint
        run: go run github.com/rhysd/actionlint/cmd/actionlint@latest

  production-readiness:
    name: Production readiness audit
    runs-on: ubuntu-latest
    needs:
      - go
      - workflow-lint
    steps:
      - name: Checkout ao-command
        uses: actions/checkout@v4

      - name: Checkout ao-forge integration fixture
        uses: actions/checkout@v4
        with:
          repository: uesugitorachiyo/ao-forge
          path: ao-forge

      - name: Checkout ao-foundry active-stack fixture
        uses: actions/checkout@v4
        with:
          repository: uesugitorachiyo/ao-foundry
          path: ao-foundry

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Release preview dry-run
        run: |
          scripts/release-preview-dry-run.sh --forge ao-forge --out tmp/release-preview --tag v0.1.0-preview

      - name: Validate release preview contract
        run: |
          go run ./cmd/ao-command evidence \
            --forge ao-forge \
            --schema "$PWD/docs/contracts/release-preview-audit-v0.1.schema.json" \
            --document "$PWD/tmp/release-preview/release-preview-audit.json"

      - name: Install verification dry-run
        run: |
          scripts/install-verify-dry-run.sh --forge ao-forge --out tmp/install-verify

      - name: Validate install verification contract
        run: |
          go run ./cmd/ao-command evidence \
            --forge ao-forge \
            --schema "$PWD/docs/contracts/install-verify-audit-v0.1.schema.json" \
            --document "$PWD/tmp/install-verify/install-verify-audit.json"

      - name: Release governance dry-run
        run: |
          scripts/release-governance-dry-run.sh \
            --out tmp/release-governance \
            --tag v0.1.0 \
            --release-preview-audit tmp/release-preview/release-preview-audit.json \
            --install-verify-audit tmp/install-verify/install-verify-audit.json

      - name: Validate release governance contract
        run: |
          go run ./cmd/ao-command evidence \
            --forge ao-forge \
            --schema "$PWD/docs/contracts/release-governance-audit-v0.1.schema.json" \
            --document "$PWD/tmp/release-governance/release-governance-audit.json"

      - name: Active stack status
        run: |
          go run ./cmd/ao-command stack --ledger ao-foundry/examples/readiness/active-stack-readiness.ledger.json

      - name: Production readiness audit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          scripts/production-readiness-audit.sh --repo uesugitorachiyo/ao-command --forge ao-forge --foundry ao-foundry --out tmp/production-readiness-audit.json --skip-remote-admin || {
            cat tmp/production-readiness-audit.json
            exit 1
          }

      - name: Validate production readiness contract
        run: |
          go run ./cmd/ao-command evidence \
            --forge ao-forge \
            --schema "$PWD/docs/contracts/production-readiness-audit-v0.1.schema.json" \
            --document "$PWD/tmp/production-readiness-audit.json"
